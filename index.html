<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard Financier</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
    font-family: Arial, sans-serif;
    background: #f4f6f9;
    margin: 0;
    padding: 20px;
}

h1 {
    text-align: center;
}

.card {
    background: white;
    padding: 20px;
    border-radius: 10px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    margin-bottom: 20px;
}

canvas {
    max-width: 100%;
}
</style>
</head>
<body>

<h1>Dashboard Financier 2026</h1>

<div class="card">
    <h2>Recettes Locatives</h2>
    <canvas id="recettesChart"></canvas>
</div>

<div class="card">
    <h2>Charges Totales</h2>
    <canvas id="chargesChart"></canvas>
</div>

<div class="card">
    <h2>Membres</h2>
    <canvas id="membresChart"></canvas>
</div>

<script>
const sheetID = "1B7ajOKNmgpUi9YnXtIBB5HIsBuDsq7R-0jPXOT1mhzo";
const gid = "1942057819";
const url = `https://docs.google.com/spreadsheets/d/${sheetID}/gviz/tq?tqx=out:json&gid=${gid}`;

fetch(url)
.then(res => res.text())
.then(rep => {
    const json = JSON.parse(rep.substr(47).slice(0, -2));
    const rows = json.table.rows;

    const mois = [];
    const recettes = [];
    const charges = [];
    const membres = [];

    rows.forEach(r => {
        if (!r.c) return;

        mois.push(r.c[2]?.v || "");
        recettes.push(parseFloat((r.c[3]?.v || 0)));
        charges.push(parseFloat((r.c[4]?.v || 0)));
        membres.push(parseFloat((r.c[10]?.v || 0)));
    });

    new Chart(document.getElementById("recettesChart"), {
        type: "bar",
        data: {
            labels: mois,
            datasets: [{
                label: "Recettes",
                data: recettes
            }]
        }
    });

    new Chart(document.getElementById("chargesChart"), {
        type: "bar",
        data: {
            labels: mois,
            datasets: [{
                label: "Charges",
                data: charges
            }]
        }
    });

    new Chart(document.getElementById("membresChart"), {
        type: "line",
        data: {
            labels: mois,
            datasets: [{
                label: "Membres",
                data: membres
            }]
        }
    });
});
</script>

</body>
</html>
